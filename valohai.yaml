version: "0.2"

steps:

- name: preprocess
  image: docker.io/yourdocker/titanic-ml
  command:
    - python src/preprocess.py
  outputs:
    - processed.csv

- name: train
  image: docker.io/yourdocker/titanic-ml
  command:
    - python src/train.py
  inputs:
    - processed.csv
  outputs:
    - model.joblib

- name: evaluate
  image: docker.io/yourdocker/titanic-ml
  command:
    - python src/evaluate.py
  inputs:
    - processed.csv
    - model.joblib

pipelines:

- name: training-pipeline
  nodes:
    - name: preprocess
      type: execution
      step: preprocess

    - name: train
      type: execution
      step: train
      parents:
        - preprocess

    - name: evaluate
      type: execution
      step: evaluate
      parents:
        - train
